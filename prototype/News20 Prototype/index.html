<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>blip — audio news</title>

<!-- Tailwind Play CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  // Map design-language.md tokens -> theme keys so class names port to the Tailwind 4 build.
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          primary: "#3B82F6",
          secondary: "#D1D4BD",
          accent: "#E8B7BC",
          background: "#020617",
          surface: "#D1D4BD",
          "text-primary": "#FFFFFF",
          "text-secondary": "#A1A1AA",
          border: "#D1D4BD",
          "caption-highlight": "#FACC15",
          "bias-left": "#3B82F6",
          "bias-center": "#A1A1AA",
          "bias-right": "#E8B7BC",
          "seg-geopolitics": "#EF4444",
          "seg-markets": "#22C55E",
          "seg-tech": "#22D3EE",
          "seg-sport": "#F59E0B",
          "seg-wildcard": "#E8B7BC",
        },
        fontFamily: {
          sans: ["Inter", "system-ui", "sans-serif"],
          serif: ['"Playfair Display"', "Georgia", "serif"],
          mono: ['"JetBrains Mono"', "monospace"],
        },
        borderRadius: { card: "1px", control: "16px", pill: "9999px" },
        spacing: { "safe-t": "59px", "safe-b": "34px" },
      },
    },
  };
</script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Icon sprite (simple line icons; stroke=currentColor) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <g id="i-save"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></g>
      <g id="i-share"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7M12 3v13M7 8l5-5 5 5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></g>
      <g id="i-follow"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></g>
      <g id="i-following"><path d="M5 12.5l4.5 4.5L19 7" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></g>
      <g id="i-ask"><path d="M4 5h16a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H9l-5 4V6a1 1 0 0 1 1-1Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></g>
      <g id="i-voice"><path d="M12 3a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V6a3 3 0 0 1 3-3ZM6 11a6 6 0 0 0 12 0M12 17v4M8 21h8" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></g>
      <g id="i-search"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></g>
      <g id="i-profile"><circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M4 21c1.5-4 5-6 8-6s6.5 2 8 6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></g>
      <g id="i-back"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></g>
      <g id="i-close"><path d="M6 6l12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></g>
      <g id="i-play"><path d="M7 5l13 7-13 7V5Z" fill="currentColor"/></g>
      <g id="i-pause"><path d="M8 5h3v14H8zM13 5h3v14h-3z" fill="currentColor"/></g>
      <g id="i-send"><path d="M4 12 20 4l-6 16-3-7-7-1Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></g>
      <g id="i-blindspot"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12Z" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="m4 4 16 16" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></g>
      <g id="i-clock"><circle cx="12" cy="12" r="8.5" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M12 7v5l3.5 2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></g>
      <g id="i-chevron-d"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></g>
      <g id="i-spark"><path d="M12 3l2 6 6 2-6 2-2 6-2-6-6-2 6-2 2-6Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></g>
      <g id="i-bell"><path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6ZM9.5 20a2.5 2.5 0 0 0 5 0" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></g>
    </defs>
  </svg>

  <div class="stage">
    <div class="device" id="device">
      <div class="screen" id="screen">
        <!-- Status bar -->
        <div class="statusbar">
          <span id="sb-time">7:18</span>
          <span class="sb-right">
            <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="7" width="3" height="5" rx="1" fill="#fff"/><rect x="4.5" y="5" width="3" height="7" rx="1" fill="#fff"/><rect x="9" y="2.5" width="3" height="9.5" rx="1" fill="#fff"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#fff" opacity="0.4"/></svg>
            <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 2.5C5.5 2.5 3.3 3.5 1.7 5.1l1.1 1.1C4.1 4.9 5.9 4 8 4s3.9.9 5.2 2.2l1.1-1.1C12.7 3.5 10.5 2.5 8 2.5Z" fill="#fff"/><path d="M8 6c-1.2 0-2.3.5-3.1 1.3l1.1 1.1C6.5 7.9 7.2 7.5 8 7.5s1.5.4 2 .9l1.1-1.1C10.3 6.5 9.2 6 8 6Z" fill="#fff"/><circle cx="8" cy="10" r="1.4" fill="#fff"/></svg>
            <svg width="26" height="13" viewBox="0 0 26 13"><rect x="0.5" y="0.5" width="21" height="12" rx="3" fill="none" stroke="#fff" opacity="0.5"/><rect x="2" y="2" width="16" height="9" rx="1.5" fill="#fff"/><rect x="23" y="4" width="2" height="5" rx="1" fill="#fff" opacity="0.5"/></svg>
          </span>
        </div>

        <!-- Layers mount here -->
        <div id="app"></div>

        <div class="island"></div>
        <div class="home-indicator"></div>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
