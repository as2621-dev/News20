<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Interest Picker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Spline+Sans+Mono:wght@400;500&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f1ea; --ink:#1b1a17; --muted:#6f6a5e; --line:#dcd6c8; --card:#fffdf7;
    --sel:#3a5a40; --sel-ink:#fffdf7; --rust:#9a4a1f; --tk:#9a4a1f;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"Spline Sans",-apple-system,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:880px;margin:0 auto;padding:44px 22px 140px}
  header{border-bottom:2px solid var(--ink);padding-bottom:18px;margin-bottom:10px}
  h1{font-family:"Fraunces",serif;font-weight:900;font-size:clamp(32px,6vw,52px);line-height:.95;margin:0 0 8px;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:15px;max-width:64ch}
  details{border:1px solid var(--line);border-radius:5px;background:var(--card);margin:9px 0;overflow:hidden}
  details[open]{border-color:var(--ink)}
  summary{cursor:pointer;list-style:none;padding:14px 18px;display:flex;align-items:center;gap:12px;font-weight:600;user-select:none}
  summary::-webkit-details-marker{display:none}
  .chev{transition:transform .18s;color:var(--muted);font-size:12px}
  details[open]>summary .chev{transform:rotate(90deg)}
  .cat>summary{font-family:"Fraunces",serif;font-size:21px}
  .pill-count{margin-left:auto;font-family:"Spline Sans Mono",monospace;font-size:11px;color:var(--rust)}
  .cat-body{padding:2px 14px 12px}
  .sub{border-top:1px solid var(--line)}
  .sub>summary{font-size:15.5px;padding:12px 6px}
  .sub-body{padding:4px 6px 14px}
  .set{margin:10px 0 4px;padding-left:2px}
  .set.nested{margin-left:14px;padding-left:14px;border-left:2px solid var(--line)}
  .set-head{display:flex;align-items:center;gap:10px;margin:6px 0}
  .set-label{font-family:"Spline Sans Mono",monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
  .mini{font-family:"Spline Sans Mono",monospace;font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;
    background:none;border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:3px 9px;cursor:pointer}
  .mini:hover{border-color:var(--ink);color:var(--ink)}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin:4px 0}
  .chip{font-family:inherit;font-size:13.5px;background:var(--card);border:1.5px solid var(--line);
    color:var(--ink);border-radius:999px;padding:6px 13px;cursor:pointer;transition:.12s;display:inline-flex;align-items:center;gap:7px}
  .chip:hover{border-color:var(--ink)}
  .chip.on{background:var(--sel);border-color:var(--sel);color:var(--sel-ink)}
  .chip .tk{font-family:"Spline Sans Mono",monospace;font-size:10.5px;color:var(--tk)}
  .chip.on .tk{color:#d9e4d2}
  .chip.custom{border-style:dashed}
  .add{display:flex;gap:6px;margin:7px 0 2px;max-width:340px}
  .add input{flex:1;font-family:inherit;font-size:13px;padding:6px 11px;border:1.5px solid var(--line);border-radius:999px;background:var(--card)}
  .add input:focus{outline:none;border-color:var(--sel)}
  .add button{font-family:"Spline Sans Mono",monospace;font-size:11px;text-transform:uppercase;border:1.5px solid var(--ink);
    background:var(--ink);color:var(--bg);border-radius:999px;padding:0 14px;cursor:pointer}
  .nested-wrap{display:none;margin-top:6px}
  .nested-wrap.show{display:block}
  /* tray */
  .tray{position:fixed;left:0;right:0;bottom:0;background:var(--ink);color:var(--bg);z-index:20}
  .tray-bar{max-width:880px;margin:0 auto;padding:12px 22px;display:flex;align-items:center;gap:14px}
  .tray-bar b{font-family:"Fraunces",serif;font-size:18px}
  .tray-bar .grow{flex:1;color:#cfc9ba;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tray-btn{font-family:"Spline Sans Mono",monospace;font-size:11px;text-transform:uppercase;letter-spacing:.04em;
    background:none;border:1.5px solid #6f6a5e;color:var(--bg);border-radius:3px;padding:8px 12px;cursor:pointer}
  .tray-btn:hover{background:var(--bg);color:var(--ink);border-color:var(--bg)}
  .panel{max-width:880px;margin:0 auto;max-height:42vh;overflow:auto;padding:0 22px;display:none;border-top:1px solid #3a3833}
  .panel.show{display:block;padding:16px 22px}
  .panel pre{font-family:"Spline Sans Mono",monospace;font-size:11.5px;white-space:pre-wrap;color:#e8e3d6;margin:0}
  .panel .grp{margin:0 0 10px}
  .panel .grp h4{margin:0 0 4px;font-family:"Spline Sans Mono",monospace;font-size:11px;color:#a8a394;text-transform:uppercase;letter-spacing:.05em}
  .panel .grp span{display:inline-block;background:#2b2925;border:1px solid #45423b;border-radius:999px;padding:3px 10px;margin:2px 4px 2px 0;font-size:12.5px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>What do you want to follow?</h1>
    <p class="sub">Tap bubbles to follow. Selecting some bubbles (NFL, Earnings, Oil&nbsp;&amp;&nbsp;gas, a music genre&hellip;) reveals deeper choices. Every group has <b>Select all</b>, <b>Show more</b>, and <b>+ add your own</b> &mdash; in production those last two pull from your live entity registry.</p>
  </header>
  <div id="tree"></div>
</div>

<div class="tray">

    <button class="tray-btn" id="togglePanel">Review</button>

</div>

const selected = new Map(); // id -> {label, ticker, kind, trail}
const slug = s => s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');

function makeChip(item, idBase, trail){
  const id = idBase + '/' + slug(item.label);
  const wrap = document.createElement('span');
  const btn = document.createElement('button');
  btn.className = 'chip' + (item.custom ? ' custom' : '');
  btn.dataset.id = id;
  btn.innerHTML = item.label + (item.ticker ? ` <span class="tk">${item.ticker}</span>` : '');
  wrap.appendChild(btn);

  let nested = null;
  if(item.sets){
    nested = document.createElement('div');
    nested.className = 'nested-wrap';
    item.sets.forEach(s => renderSet(s, id, [...trail, item.label], nested, true));
    wrap.appendChild(nested);
  }
  btn.onclick = () => {
    const on = btn.classList.toggle('on');
    if(on) selected.set(id, {label:item.label, ticker:item.ticker||null, kind:item.kind||null, trail:[...trail, item.label]});
    else selected.delete(id);
    if(nested) nested.classList.toggle('show', on);
    sync();
  };
  return {wrap, btn};
}

function renderSet(set, idBase, trail, container, nested){
  const setId = idBase + '/' + slug(set.label);
  const box = document.createElement('div');
  box.className = 'set' + (nested ? ' nested' : '');

  const head = document.createElement('div');
  head.className = 'set-head';
  head.innerHTML = `<span class="set-label">${set.label}</span>`;
  const all = document.createElement('button'); all.className='mini'; all.textContent='Select all';
  head.appendChild(all);
  box.appendChild(head);

  const chips = document.createElement('div'); chips.className='chips'; box.appendChild(chips);
  const btns = [];
  set.items.forEach(i => { const {wrap,btn} = makeChip(i, setId, trail); chips.appendChild(wrap); btns.push(btn); });

  if(set.more && set.more.length){
    const moreBtn = document.createElement('button'); moreBtn.className='mini'; moreBtn.textContent='+ Show more';
    head.appendChild(moreBtn);
    moreBtn.onclick = () => {
      set.more.forEach(i => { const {wrap,btn} = makeChip(i, setId, trail); chips.appendChild(wrap); btns.push(btn); });
      moreBtn.remove();
    };
  }

  all.onclick = () => {
    const turnOn = btns.some(b => !b.classList.contains('on'));
    btns.forEach(b => { if(b.classList.contains('on') !== turnOn) b.click(); });
  };

  // add-your-own
  const add = document.createElement('div'); add.className='add';
  const inp = document.createElement('input'); inp.placeholder='Add your own…';
  const go = document.createElement('button'); go.textContent='Add';
  add.appendChild(inp); add.appendChild(go); box.appendChild(add);
  const addCustom = () => {
    const v = inp.value.trim(); if(!v) return;
    const {wrap, btn} = makeChip({label:v, custom:true}, setId, trail);
    chips.appendChild(wrap); btns.push(btn); btn.click(); inp.value='';
  };
  go.onclick = addCustom;
  inp.onkeydown = e => { if(e.key==='Enter') addCustom(); };

  container.appendChild(box);
}

const tree = document.getElementById('tree');
DATA.categories.forEach(cat => {
  const d = document.createElement('details'); d.className='cat';
  d.innerHTML = `<summary><span class="chev">&#9654;</span>${cat.label}<span class="pill-count" data-cat="${cat.id}"></span></summary>`;
  const body = document.createElement('div'); body.className='cat-body';
  cat.subs.forEach(sub => {
    const sd = document.createElement('details'); sd.className='sub';
    sd.innerHTML = `<summary><span class="chev">&#9654;</span>${sub.label}</summary>`;
    const sb = document.createElement('div'); sb.className='sub-body';
    sub.sets.forEach(s => renderSet(s, cat.id+'/'+slug(sub.label), [cat.label, sub.label], sb, false));
    sd.appendChild(sb); body.appendChild(sd);
  });
  d.appendChild(body); tree.appendChild(d);
});

// ---- sync tray + per-category counts ----
const countEl=document.getElementById('count'), prev=document.getElementById('preview'), panel=document.getElementById('panel');
function sync(){
  countEl.textContent = selected.size;
  const labels = [...selected.values()].map(v=>v.label);
  prev.textContent = labels.length ? labels.slice(0,6).join('  ·  ') + (labels.length>6?'  …':'') : 'No follows yet';
  // per category counts
  const byCat = {};
  selected.forEach(v => { const c=v.trail[0]; byCat[c]=(byCat[c]||0)+1; });
  document.querySelectorAll('.pill-count').forEach(el=>{
    const cat = DATA.categories.find(c=>c.id===el.dataset.cat);
    const n = byCat[cat.label]||0; el.textContent = n? n+' following':'';
  });
  if(panel.classList.contains('show')) renderPanel();
}
function grouped(){
  const g={};
  selected.forEach(v=>{ const c=v.trail[0]; (g[c]=g[c]||[]).push(v); });
  return g;
}
function renderPanel(){
  const g=grouped();
  if(!selected.size){ panel.innerHTML='<pre>Nothing selected yet.</pre>'; return; }
  let h='';
  Object.keys(g).forEach(cat=>{
    h+=`<div class="grp"><h4>${cat}</h4>`;
    g[cat].forEach(v=>{ h+=`<span>${v.trail.slice(1).join(' › ')}${v.ticker?' · '+v.ticker:''}</span>`; });
    h+='</div>';
  });
  panel.innerHTML=h;
}
document.getElementById('togglePanel').onclick=()=>{ panel.classList.toggle('show'); if(panel.classList.contains('show')) renderPanel(); };
document.getElementById('copyBtn').onclick=()=>{
  const out=[...selected.values()].map(v=>({follow:v.label,path:v.trail,ticker:v.ticker,kind:v.kind}));
  const json=JSON.stringify(out,null,2);
  navigator.clipboard?.writeText(json).then(()=>{
    const b=document.getElementById('copyBtn'); const t=b.textContent; b.textContent='Copied ✓'; setTimeout(()=>b.textContent=t,1200);
  }).catch(()=>{ alert(json); });
};
sync();
